kind = "web"
previewPath = "/"
title = "ACLS Code Simulation"
version = "1.0.0"
id = "artifacts/code-sim"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20192

[services.development]
run = "pnpm --filter @workspace/code-sim run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/code-sim", "run", "build" ]
publicDir = "artifacts/code-sim/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20192"
BASE_PATH = "/"

openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: preferences
    description: User UI preferences
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /preferences/{userId}:
    get:
      operationId: getUserPreferences
      tags: [preferences]
      summary: Get user preferences
      description: Returns stored UI preferences for a given user. Returns defaults when the user has no saved preferences.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            maxLength: 128
            pattern: "^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}|[a-zA-Z0-9]+)$"
      responses:
        "200":
          description: User preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
    put:
      operationId: setUserPreferences
      tags: [preferences]
      summary: Save user preferences
      description: Upserts UI preferences for a given user.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            maxLength: 128
            pattern: "^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}|[a-zA-Z0-9]+)$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPreferences"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    UserPreferences:
      type: object
      properties:
        minimapVisible:
          type: boolean
        tagsVisible:
          type: boolean
      required:
        - minimapVisible
        - tagsVisible
